apiVersion: v1
kind: Secret
metadata:
  name: nexusops-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nexusops.labels" . | nindent 4 }}
type: Opaque
stringData:
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  LANGCHAIN_API_KEY: {{ .Values.secrets.langchainApiKey | quote }}
  TAVILY_API_KEY: {{ .Values.secrets.tavilyApiKey | quote }}
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.auth.database }}"
  REDIS_URL: "redis://redis:{{ .Values.redis.port }}/0"
