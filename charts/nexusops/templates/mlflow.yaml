{{- if .Values.mlflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: {{ .Values.namespace }}
  labels:
    app: mlflow
    {{- include "nexusops.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "{{ .Values.mlflow.port }}"]
          ports:
            - containerPort: {{ .Values.mlflow.port }}
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: {{ .Values.namespace }}
  labels:
    app: mlflow
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
    - port: {{ .Values.mlflow.port }}
      targetPort: {{ .Values.mlflow.port }}
{{- end }}
