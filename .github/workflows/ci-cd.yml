name: NexusOps CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Code Quality ────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check nexusops/ agents/ ml/ simulator/ api/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check nexusops/ agents/ ml/ simulator/ api/ tests/

  # ── Job 2: Tests ───────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexusops
          POSTGRES_PASSWORD: nexusops
          POSTGRES_DB: nexusops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mlflow:
        image: ghcr.io/mlflow/mlflow:v2.19.0
        ports:
          - 5001:5000
        env:
          MLFLOW_BACKEND_STORE_URI: sqlite:///mlflow.db
          MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts

      qdrant:
        image: qdrant/qdrant:v1.13.0
        ports:
          - 6333:6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install tensorflow-cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        env:
          OPENAI_API_KEY: "test-key"
          LANGCHAIN_TRACING_V2: "false"
          DATABASE_URL: "postgresql+asyncpg://nexusops:nexusops@localhost:5432/nexusops"
          REDIS_URL: "redis://localhost:6379/0"
          MLFLOW_TRACKING_URI: "http://localhost:5001"
          QDRANT_URL: "http://localhost:6333"
        run: |
          pytest tests/ \
            --cov=nexusops \
            --cov=agents \
            --cov=ml \
            --cov=simulator \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: coverage.xml
          flags: unittests

  # ── Job 3: Docker Build Check ──────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: nexusops-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
