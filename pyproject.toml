[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP"]
# E501: line too long (handled by formatter)
# B008: do not perform function calls in default arguments (FastAPI pattern)
# N806: variable in function should be lowercase (ML convention: X_train, X_val)
# B905: zip() without strict= (not needed for internal data shuffling)
# UP042: StrEnum (str+Enum pattern is more widely compatible)
ignore = ["E501", "B008", "N806", "B905", "UP042"]

[tool.ruff.lint.isort]
known-first-party = ["nexusops", "agents", "ml", "simulator", "api"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
